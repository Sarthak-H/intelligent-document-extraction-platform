<!DOCTYPE html>
<html>
<head>
    <title>Document Extraction Result</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            padding:40px;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            width:600px;
            margin:auto;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        td,th{
            border:1px solid #ddd;
            padding:10px;
        }

        th{
            background:#007bff;
            color:white;
        }

        a{
            text-decoration:none;
            color:white;
            background:#28a745;
            padding:10px 15px;
            border-radius:5px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Extracted Information</h1>

    <table>

        <tr>
            <th>Field</th>
            <th>Value</th>
        </tr>

        {% for key, value in result.items() %}
        <tr>
            <td>{{ key }}</td>
            <td>{{ value }}</td>
        </tr>
        {% endfor %}

    </table>

    <br>

    <a href="/">Upload Another Document</a>

</div>

</body>
</html>
