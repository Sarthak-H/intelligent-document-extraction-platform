<!DOCTYPE html>
<html>
<head>
    <title>Document Extractor</title>
</head>
<body>

    <h1>Document Extractor</h1>

    <form
        action="/extract"
        method="POST"
        enctype="multipart/form-data">

        <input
            type="file"
            name="document"
            required>

        <br><br>

        <button type="submit">
            Extract Data
        </button>

    </form>

</body>
</html>
